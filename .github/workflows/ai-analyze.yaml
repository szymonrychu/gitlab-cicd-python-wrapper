name: AI Pipeline Drift Analysis

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Run drift analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/analyze_drift.py

      - name: Create issue if drift detected
        if: steps.analyze.outcome == 'success' && hashFiles('drift-report.md') != ''
        uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710 # v6
        with:
          title: "Pipeline Drift Detected"
          content-filepath: drift-report.md
          labels: drift,automated
