name: AI Pipeline Drift Analysis

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Run drift analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/analyze_drift.py

      - name: Create issue if drift detected
        if: steps.analyze.outcome == 'success' && hashFiles('drift-report.md') != ''
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Pipeline Drift Detected"
          content-filepath: drift-report.md
          labels: drift,automated
