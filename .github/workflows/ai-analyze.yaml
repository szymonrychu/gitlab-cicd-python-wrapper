name: AI Pipeline Drift Analysis

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Run drift analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/analyze_drift.py

      - name: Create issue if drift detected
        if: steps.analyze.outcome == 'success' && hashFiles('drift-report.md') != ''
        uses: peter-evans/create-issue-from-file@e8ef132d6df98ed982188e460ebb3b5d4ef3a9cd # v5
        with:
          title: "Pipeline Drift Detected"
          content-filepath: drift-report.md
          labels: drift,automated
